<header><h1>no_player</h1><span class="type">Type: <a href="script/api/object.html">Object</a></span></header>
<p>A value which represents "none," usable where an player variable can 
         appear.</p>
<p>This is a "none" value, so you cannot assign to it or access members on it.</p>
